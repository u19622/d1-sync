name: D1 Sync Railway to Neon

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
      NEON_URL: ${{ secrets.NEON_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run sync
        run: python sync.py
